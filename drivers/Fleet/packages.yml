info:
  name: packages
  type: http

http:
  method: POST
  url: http://127.0.0.1:5000/packages
  body:
    type: json
    data: |-
      {
        "package_id": 20,
        "description": "Two items in one package",
        "weight": 3.5
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
