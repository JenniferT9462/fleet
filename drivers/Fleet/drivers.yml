info:
  name: drivers
  type: http

http:
  method: POST
  url: http://127.0.0.1:5000/drivers
  body:
    type: json
    data: |-
      {
        "name": "Jenn Tarleton",
        "license_type": "basic",
        "driver_id": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
