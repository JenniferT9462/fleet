info:
  name: vehicle
  type: http

http:
  method: POST
  url: http://127.0.0.1:5000/vehicle
  body:
    type: json
    data: |-
      {
        "license_plate": "234fgh",
        "model": "Kia Soul",
        "driver_id": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
